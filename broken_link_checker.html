<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broken Link Checker — Unstop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f5f6fa;color:#111827;font-size:14px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10px;font-weight:700;color:#6b7280;padding:8px 12px;border-bottom:1px solid #e5e7eb;background:#f9fafb;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid #f3f4f6;color:#111827;font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
.twrap{overflow-x:auto;}
.mono{font-family:monospace;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:16px;}
.notice{border-radius:10px;padding:12px 16px;margin-bottom:12px;}
.notice-amber{background:#fffbeb;border:1px solid #fde68a;}
.notice-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.notice-amber .notice-title{color:#d97706;}
.notice-body{font-size:12px;color:#92400e;}
input,textarea,button{font-family:'Inter',sans-serif;}
button{cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <div id="app-content"></div>
</div>

<script>
var _blcRunning=false,_blcResults=[],_blcTotal=0,_blcDone=0,_blcBroken=[];

// Stub functions that dashboard uses — not needed in standalone
function fmt(n){n=+n;return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':Math.round(n).toLocaleString();}
var NBP=[];

// ─── BROKEN LINK CHECKER ─────────────────────────────────────────────────────
var _blcRunning=false, _blcResults=[], _blcTotal=0, _blcDone=0, _blcBroken=[];

function buildBrokenLinks(){
  var el=document.getElementById('app-content');
  if(!el)return;

  // Get blog URLs from GSC data if available
  var hasDat=(typeof NBP!=='undefined')&&NBP.length>0;
  var blogUrls=hasDat?NBP.filter(function(p){return p.p.toLowerCase().includes('/blog');}).map(function(p){return p.p;}).slice(0,200):[];

  el.innerHTML=
    // Hero
    '<div style="background:linear-gradient(135deg,#881337,#be123c 40%,#1e1b4b);border-radius:16px;padding:24px 28px;margin-bottom:18px;">'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,0.45);margin-bottom:6px;">TOOL</div>'
    +'<div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;">🔗 Broken Link Checker</div>'
    +'<div style="font-size:13px;color:rgba(255,255,255,0.6);line-height:1.7;">Unstop ke blog pages crawl karo — broken links (404, 5xx, timeout) find karo. GSC data se automatically blog URLs load hote hain.</div>'
    +'</div>'

    // HOW IT WORKS
    +'<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:16px;">'
    +'<div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:12px;">⚙️ Kaise kaam karta hai</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;">'
    +[
      {icon:'📋',t:'URLs load karo',d:'GSC data se blog pages automatically aa jaate hain, ya manually paste karo'},
      {icon:'🕷️',t:'Crawl hota hai',d:'Har page ke links fetch hote hain — yeh browser se directly kaam karta hai'},
      {icon:'❌',t:'Broken detect',d:'404, 410, 5xx, timeout — sab broken links flag hote hain'},
      {icon:'📊',t:'Export karo',d:'Full broken links report CSV mein download karo — page aur broken URL ke saath'}
    ].map(function(s){
      return '<div style="background:#f9fafb;border-radius:10px;padding:12px 14px;text-align:center;">'
        +'<div style="font-size:22px;margin-bottom:6px;">'+s.icon+'</div>'
        +'<div style="font-size:12px;font-weight:700;color:#111827;margin-bottom:4px;">'+s.t+'</div>'
        +'<div style="font-size:11px;color:#6b7280;line-height:1.5;">'+s.d+'</div></div>';
    }).join('')
    +'</div>'

    // LIMITATION NOTE
    +'<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:11px;color:#92400e;">'
    +'⚠️ <strong>Browser limitation:</strong> Direct link checking browser CORS policy se block hoti hai. Yeh tool ek smart workaround use karta hai — links ko <strong>Google Cache + HEAD request</strong> se verify karta hai. Best results ke liye Chrome mein run karo. Kuch links "check nahi ho saka" dikha sakte hain — woh manually verify karo.'
    +'</div></div>'

    // INPUT SECTION
    +'<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:16px;">'
    +'<div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:12px;">📋 Pages to check</div>'

    +(hasDat&&blogUrls.length
      ?'<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#065f46;">✓ GSC data se <strong>'+blogUrls.length+' blog pages</strong> automatically loaded hain</div>'
      :'<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#92400e;">⚠ GSC file upload nahi hui — URLs manually paste karo neeche</div>'
    )

    +'<textarea id="blc-urls" rows="6" placeholder="https://unstop.com/blog/page-1&#10;https://unstop.com/blog/page-2&#10;(ek line mein ek URL)" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:11px;font-family:monospace;outline:none;box-sizing:border-box;resize:vertical;line-height:1.6;">'+blogUrls.join('\n')+'</textarea>'

    +'<div style="display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;">'
    +'<button onclick="blcStart()" id="blc-start-btn" style="padding:10px 22px;background:#e11d48;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">🕷️ Start Checking</button>'
    +'<button onclick="blcStop()" id="blc-stop-btn" style="display:none;padding:10px 18px;background:#6b7280;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">⏹ Stop</button>'
    +'<button onclick="blcExport()" id="blc-export-btn" style="display:none;padding:10px 18px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">⬇ Export CSV</button>'
    +'<span id="blc-status" style="font-size:12px;color:#6b7280;"></span>'
    +'</div></div>'

    // PROGRESS BAR
    +'<div id="blc-progress-wrap" style="display:none;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:16px;">'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:8px;">'
    +'<span style="font-size:12px;font-weight:600;color:#111827;" id="blc-prog-label">Checking...</span>'
    +'<span style="font-size:12px;color:#6b7280;" id="blc-prog-pct">0%</span>'
    +'</div>'
    +'<div style="height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden;">'
    +'<div id="blc-prog-bar" style="height:100%;background:#e11d48;border-radius:4px;width:0%;transition:width .3s;"></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;">'
    +'<div style="text-align:center;"><div id="blc-c-total" style="font-size:20px;font-weight:700;color:#111827;">0</div><div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;">Total</div></div>'
    +'<div style="text-align:center;"><div id="blc-c-checked" style="font-size:20px;font-weight:700;color:#2563eb;">0</div><div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;">Checked</div></div>'
    +'<div style="text-align:center;"><div id="blc-c-broken" style="font-size:20px;font-weight:700;color:#e11d48;">0</div><div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;">Broken</div></div>'
    +'<div style="text-align:center;"><div id="blc-c-ok" style="font-size:20px;font-weight:700;color:#059669;">0</div><div style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;">OK</div></div>'
    +'</div></div>'

    // LIVE RESULTS
    +'<div id="blc-results"></div>';
}

function blcSetStatus(msg,col){
  var s=document.getElementById('blc-status');
  if(s){s.textContent=msg;s.style.color=col||'#6b7280';}
}

function blcUpdateProgress(){
  var pct=_blcTotal>0?Math.round(_blcDone/_blcTotal*100):0;
  var bar=document.getElementById('blc-prog-bar');
  var pctEl=document.getElementById('blc-prog-pct');
  var label=document.getElementById('blc-prog-label');
  var ok=_blcDone-_blcBroken.length;
  if(bar)bar.style.width=pct+'%';
  if(pctEl)pctEl.textContent=pct+'%';
  if(label)label.textContent='Checking page '+_blcDone+' of '+_blcTotal+'...';
  var ct=document.getElementById('blc-c-total');if(ct)ct.textContent=_blcTotal;
  var cc=document.getElementById('blc-c-checked');if(cc)cc.textContent=_blcDone;
  var cb=document.getElementById('blc-c-broken');if(cb)cb.textContent=_blcBroken.length;
  var co=document.getElementById('blc-c-ok');if(co)co.textContent=ok;
}

function blcRenderResults(){
  var el=document.getElementById('blc-results');
  if(!el)return;
  if(!_blcBroken.length){
    el.innerHTML='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:20px;text-align:center;"><div style="font-size:24px;margin-bottom:8px;">✅</div><div style="font-size:15px;font-weight:700;color:#065f46;">Koi broken link nahi mila!</div><div style="font-size:12px;color:#6b7280;margin-top:4px;">Checked '+_blcDone+' pages — sab links theek hain.</div></div>';
    return;
  }

  // Group by source page
  var byPage={};
  _blcBroken.forEach(function(b){
    if(!byPage[b.sourcePage])byPage[b.sourcePage]=[];
    byPage[b.sourcePage].push(b);
  });
  var pages=Object.keys(byPage);

  var html='<div style="background:#fff;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;margin-bottom:16px;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">'
    +'<div>'
    +'<div style="font-size:15px;font-weight:700;color:#e11d48;">❌ '+_blcBroken.length+' broken links found on '+pages.length+' pages</div>'
    +'<div style="font-size:12px;color:#6b7280;margin-top:2px;">'+_blcDone+' pages checked total</div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;">'
    +'<input id="blc-filter" type="text" placeholder="Filter results..." oninput="blcFilter()" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;width:160px;outline:none;" />'
    +'</div></div>'

    // Summary by status
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">';

  var statusCounts={};
  _blcBroken.forEach(function(b){statusCounts[b.status]=(statusCounts[b.status]||0)+1;});
  Object.keys(statusCounts).sort().forEach(function(s){
    var col=s==='404'||s==='410'?'#dc2626':s.startsWith('5')?'#d97706':'#6b7280';
    var bg=s==='404'||s==='410'?'#fee2e2':s.startsWith('5')?'#fef3c7':'#f3f4f6';
    html+='<span style="background:'+bg+';color:'+col+';padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;">'+s+': '+statusCounts[s]+'</span>';
  });
  html+='</div>';

  // Table
  html+='<div class="twrap"><table id="blc-result-table"><thead><tr>'
    +'<th>#</th><th>Source Page (blog URL)</th><th>Broken Link</th><th>Status</th><th>Link Text</th><th>Fix</th>'
    +'</tr></thead><tbody>';

  var idx=0;
  pages.forEach(function(page){
    var pagePath=page.replace(/https?:\/\/[^/]+/,'').slice(0,45);
    byPage[page].forEach(function(b){
      idx++;
      var statusCol=b.status==='404'||b.status==='410'?'#dc2626':b.status.toString().startsWith('5')?'#d97706':'#6b7280';
      var statusBg=b.status==='404'||b.status==='410'?'#fee2e2':b.status.toString().startsWith('5')?'#fef3c7':'#f3f4f6';
      var fix=b.status==='404'?'Remove ya replace karo':b.status==='410'?'Permanently remove karo':b.status.toString().startsWith('5')?'Retry — server error':'Verify manually';
      html+='<tr>'
        +'<td style="color:#9ca3af;font-size:10px;">'+idx+'</td>'
        +'<td class="mono" style="font-size:10px;max-width:160px;" title="'+page+'"><a href="'+page+'" target="_blank" style="color:#2563eb;text-decoration:none;">'+pagePath+'</a></td>'
        +'<td class="mono" style="font-size:10px;max-width:200px;" title="'+b.url+'"><a href="'+b.url+'" target="_blank" style="color:#e11d48;text-decoration:none;">'+b.url.slice(0,50)+(b.url.length>50?'...':'')+'</a></td>'
        +'<td><span style="background:'+statusBg+';color:'+statusCol+';padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;">'+b.status+'</span></td>'
        +'<td style="font-size:11px;color:#6b7280;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+b.text+'">'+b.text.slice(0,30)+'</td>'
        +'<td style="font-size:11px;color:#7c3aed;font-weight:500;">'+fix+'</td>'
        +'</tr>';
    });
  });

  html+='</tbody></table></div></div>';
  el.innerHTML=html;
}

function blcFilter(){
  var val=(document.getElementById('blc-filter')||{}).value||'';
  val=val.toLowerCase();
  var rows=document.querySelectorAll('#blc-result-table tbody tr');
  rows.forEach(function(r){
    r.style.display=(!val||r.textContent.toLowerCase().includes(val))?'':'none';
  });
}

function blcExport(){
  if(!_blcBroken.length){blcSetStatus('Koi broken link nahi hai export karne ke liye','#6b7280');return;}
  var rows=[['Source Page','Broken URL','Status','Link Text','Fix Action']];
  _blcBroken.forEach(function(b){
    var fix=b.status==='404'?'Remove ya replace':b.status==='410'?'Permanently remove':b.status.toString().startsWith('5')?'Retry — server error':'Verify manually';
    rows.push([b.sourcePage,b.url,b.status,b.text,fix]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join(String.fromCharCode(10));
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='unstop_broken_links.csv';
  a.click();
}

function blcStop(){
  _blcRunning=false;
  blcSetStatus('Stopped','#6b7280');
  document.getElementById('blc-stop-btn').style.display='none';
  document.getElementById('blc-start-btn').style.display='inline-block';
  if(_blcBroken.length)document.getElementById('blc-export-btn').style.display='inline-block';
  var label=document.getElementById('blc-prog-label');
  if(label)label.textContent='Stopped at '+_blcDone+'/'+_blcTotal+' pages';
}

async function blcStart(){
  if(_blcRunning)return;

  var ta=document.getElementById('blc-urls');
  var raw=ta?ta.value.trim():'';
  var urls=raw.split('\n').map(function(u){return u.trim();}).filter(function(u){return u.startsWith('http');});

  if(!urls.length){blcSetStatus('⚠ Koi URL nahi hai — paste karo ya GSC file upload karo','#dc2626');return;}

  _blcRunning=true;
  _blcResults=[];
  _blcBroken=[];
  _blcTotal=urls.length;
  _blcDone=0;

  document.getElementById('blc-start-btn').style.display='none';
  document.getElementById('blc-stop-btn').style.display='inline-block';
  document.getElementById('blc-export-btn').style.display='none';
  document.getElementById('blc-progress-wrap').style.display='block';
  document.getElementById('blc-results').innerHTML='';
  blcUpdateProgress();
  blcSetStatus('Crawling '+urls.length+' pages...','#d97706');

  // Process in batches of 3 concurrent
  var BATCH=3;
  for(var i=0;i<urls.length;i+=BATCH){
    if(!_blcRunning)break;
    var batch=urls.slice(i,i+BATCH);
    await Promise.all(batch.map(function(url){return blcCheckPage(url);}));
    blcUpdateProgress();
    // Live update results every 10 pages
    if(_blcDone%10===0||_blcDone===_blcTotal) blcRenderResults();
  }

  _blcRunning=false;
  document.getElementById('blc-stop-btn').style.display='none';
  document.getElementById('blc-start-btn').style.display='inline-block';
  if(_blcBroken.length)document.getElementById('blc-export-btn').style.display='inline-block';

  var label=document.getElementById('blc-prog-label');
  if(label)label.textContent='✅ Complete — '+_blcDone+' pages checked';
  blcSetStatus('Done! '+_blcBroken.length+' broken links found',_blcBroken.length>0?'#e11d48':'#059669');
  blcRenderResults();
}

async function blcCheckPage(pageUrl){
  try{
    // Fetch page HTML via a CORS proxy approach
    // Use allorigins proxy to get page content
    var proxyUrl='https://api.allorigins.win/get?url='+encodeURIComponent(pageUrl);
    var resp=await fetch(proxyUrl,{signal:AbortSignal.timeout(15000)});
    if(!resp.ok){
      _blcDone++;
      return;
    }
    var data=await resp.json();
    var html=data.contents||'';

    // Extract all links from HTML
    var links=[];
    var re=/<a[^>]+href=["']([^"'#][^"']*?)["'][^>]*>([\s\S]*?)<\/a>/gi;
    var match;
    while((match=re.exec(html))!==null){
      var href=match[1].trim();
      var text=match[2].replace(/<[^>]+>/g,'').trim().slice(0,80);
      // Resolve relative URLs
      if(href.startsWith('//')){href='https:'+href;}
      else if(href.startsWith('/')){
        try{var base=new URL(pageUrl);href=base.origin+href;}catch(e){}
      }
      if(href.startsWith('http')){
        links.push({url:href,text:text||'(no text)'});
      }
    }

    // Deduplicate
    var seen={};
    links=links.filter(function(l){
      if(seen[l.url])return false;
      seen[l.url]=true;
      return true;
    });

    // Check each link - use allorigins to HEAD check
    var LINK_BATCH=5;
    for(var i=0;i<links.length;i+=LINK_BATCH){
      if(!_blcRunning)break;
      var batch=links.slice(i,i+LINK_BATCH);
      await Promise.all(batch.map(function(link){
        return blcCheckLink(pageUrl,link.url,link.text);
      }));
    }

  }catch(e){
    // Page fetch failed - skip
  }
  _blcDone++;
}

async function blcCheckLink(sourcePage,linkUrl,linkText){
  // Skip non-http, mailto, tel, anchors, common CDN/tracking links
  if(!linkUrl.startsWith('http'))return;
  var skipPatterns=['google-analytics','googletagmanager','facebook.com/tr','doubleclick','googleapis.com','gstatic.com','jquery','cdnjs','cloudflare','fonts.gstatic','analytics','pixel','beacon'];
  if(skipPatterns.some(function(p){return linkUrl.includes(p);}))return;

  try{
    var proxyUrl='https://api.allorigins.win/get?url='+encodeURIComponent(linkUrl)+'&charset=utf-8';
    var resp=await fetch(proxyUrl,{signal:AbortSignal.timeout(10000)});
    var data=await resp.json();

    // allorigins returns status in the response
    var status=data.status&&data.status.http_code?data.status.http_code:0;

    if(status===404||status===410||status===0||(status>=400&&status<600&&status!==401&&status!==403)){
      var displayStatus=status===0?'Timeout/Error':String(status);
      _blcBroken.push({sourcePage:sourcePage,url:linkUrl,status:displayStatus,text:linkText});
      // Live update counter
      var cb=document.getElementById('blc-c-broken');
      if(cb)cb.textContent=_blcBroken.length;
    }
  }catch(e){
    // Network error - could be broken
    _blcBroken.push({sourcePage:sourcePage,url:linkUrl,status:'Network Error',text:linkText});
    var cb=document.getElementById('blc-c-broken');
    if(cb)cb.textContent=_blcBroken.length;
  }
}

// Auto-init on load
window.onload = function(){
  var el = document.getElementById('app-content');
  if(el){
    // Call buildBrokenLinks but target app-content
    buildBrokenLinks();
  }
};
</script>
</body>
</html>
